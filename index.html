<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    
    <title>Conversor de Moedas</title>
</head>

<body>

    <img id="main-img" src="./assests/logo.png" alt="logo-coversor" />

    <main>
        <label>Converter <b>de</b>
            <select>
                <option>R$ Real brasileiro</option>
            </select>
        </label>

        <label>Converter <b>para</b>
            <select class="currency-select">
                <option value="dolar">US$ Dólar americano</option>
                <option value="euro">€ Euro</option>
            </select>
        </label>

        <label>Valor
            <input class="input-value" placeholder="R$ 0,00">
        </label>

        <button class="convert-button">Converter</button>

        <section>
            <div>
                <img class="logo-real" src="./assests/real-logo.png" alt="logo-real">
                <p class="currency-name">Real</p>
                <p class="value-to-convert">R$ 0,00</p>


                <img src="./assests/arrow-logo.png" alt="arrow-vector">


                <img class="logo-currency" src="./assests/dollar-logo.png" alt="logo-currency">
                <p class="currency-name" id="currency-name-change">Dólar Americano</p>
                <p class="converted-currency-value">US$ 0,00</p>
            </div>

        </section>

    </main>

</body>
<script src="./scripts.js"></script>

</html>
